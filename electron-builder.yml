appId: com.figma-design-agent.app
productName: Figma Design Agent
directories:
  output: release
  buildResources: resources
files:
  - out/**/*
  - package.json
mac:
  target:
    - target: dmg
      arch:
        - arm64
        - x64
  category: public.app-category.developer-tools
  artifactName: ${productName}-${version}-${arch}.${ext}
dmg:
  contents:
    - x: 130
      y: 220
    - x: 410
      y: 220
      type: link
      path: /Applications
